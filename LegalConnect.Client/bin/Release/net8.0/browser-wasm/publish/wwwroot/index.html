<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LawCity – Find Expert Lawyers</title>
    <base href="/" />

    <!-- Bootstrap 5 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
          crossorigin="anonymous" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet" />

    <!-- Custom Styles -->
    <link href="css/app.css" rel="stylesheet" />
    <link href="LegalConnect.Client.styles.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <!-- Blazor loading splash -->
        <div class="lc-splash d-flex flex-column align-items-center justify-content-center vh-100">
            <div class="lc-splash-logo mb-4">
                <img src="image/logo.jpeg" alt="LawCity" style="height:64px;" />
            </div>
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading…</span>
            </div>
            <p class="mt-3 text-muted">Loading application…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
            crossorigin="anonymous"></script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/google-auth.js"></script>
    <script>
        window.downloadFileFromBytes = function (fileName, contentType, bytesBase64) {
            const bytes = Uint8Array.from(atob(bytesBase64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: contentType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        };

        window.viewFileInBrowser = function (contentType, bytesBase64) {
            const bytes = Uint8Array.from(atob(bytesBase64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: contentType });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        };

        window.printHtml = function (html, title) {
            var win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`<!DOCTYPE html><html><head>
                <title>${title}</title>
                <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
                <style>
                    body { font-family: Arial, sans-serif; padding: 24px; font-size: 14px; }
                    .timeline-item { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #dee2e6; }
                    @media print { body { padding: 8px; } }
                </style>
            </head><body>${html}
            <script>setTimeout(function(){ window.print(); }, 600);<\/script>
            </body></html>`);
            win.document.close();
        };
    </script>
</body>
</html>
